{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4">{{ trip.title }}</h2>

    <p><strong>Location</strong> {{ trip.location }}</p>
    <p><strong>Price</strong> {{ trip.price }}</p>
    <p><strong>Dates</strong> {{ trip.start_date }} -> {{ trip.end_date }}</p>

    <p class="mt-3">{{ trip.description }}</p>

    <a href="{% url 'index' %}" class="btn btn-secondary mt-3">
        Back to trips
    </a>

    </div>

{% endblock %}
