{% extends "base.html" %}
{% load translations %}

{% block content %}

<div class="container mt-5">
    <h2 class="mb-4 text-center">
        {% t "Kontakt" "Contact" %}
    </h2>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="mb-3">
            <label class="form-label">
                {% t "Imię" "Name" %}
            </label>
            {{ form.your_name }}
        </div>

        <div class="mb-3">
            <label class="form-label">
                {% t "Email" "Email" %}
            </label>
            {{ form.your_email }}
        </div>

        <div class="mb-3">
            <label class="form-label">
                {% t "Wiadomość" "Message" %}
            </label>
            {{ form.your_message }}
        </div>

        <button class="btn btn-primary mt-3 px-4 rounded-pill">
            {% t "Wyślij" "Send" %}
        </button>

    </form>
</div>

{% endblock %}
