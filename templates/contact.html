{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <h2 class="mb-4 text-center">Contact</h2>

    <form method="post">
        {% csrf_token %}

        {% if form.errors %}
            <div class="alert alert-danger">
                {{ form.errors }}
            </div>
        {% endif %}

        <div class="mb-3">
            {{ form.your_name.label_tag}}
            {{ form.your_name }}
        </div>

        <div class="mb-3">
            {{ form.your_email.label_tag}}
            {{ form.your_email }}
        </div>

        <div class="mb-3">
            {{ form.your_message.label_tag}}
            {{ form.your_message }}
        </div>

        <button class="btn btn-primary">Send</button>
    </form>
</div>

{% endblock %}
