{% extends "base.html" %}

{% load translations %}

{% block content %}

<div class="container mt-5" style="max-width: 800px;">
    <h2 class="mb-4 text-center">{% t "Zmień hasło" "Change password" %}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-primary w-100 mt-3">
            {% t "Zapisz zmiany" "Save changes" %}
        </button>
    </form>
</div>

{% endblock %}
