{% extends "base.html" %}

{% block content %}

<div class="container">

    <h2 class="mb-4 text-center">Upcoming trips</h2>

    <div class="row">
        {% for trip in trips %}
            <div class="col-md-4">
                <a href="{% url 'detail' trip.id %}" style="text-decoration: none; color: inherit;">

                    {% with trip.images.first as img %}
                    <div class="card trip-card text-white"
                         style="height: 300px;
                                background-size: cover;
                                background-position: center;
                                background-image: url('{% if img %}{{ img.image.url }}{% else %}https://via.placeholder.com/400x300{% endif %}');">

                        <div class="card-img-overlay d-flex flex-column justify-content-end"
                             style="background: rgba(0,0,0,0.4);">

                            <h4>{{ trip.title }}</h4>
                            <p class="mb-1">{{ trip.location }}</p>
                            <strong>{{ trip.price }} {{ trip.get_currency_symbol }}</strong>

                        </div>
                    </div>
                    {% endwith %}

                </a>
            </div>
        {% endfor %}
    </div>

    <div class="text-center mt-4">
        <a href="{% url 'index' %}" class="btn btn-primary btn-lg">
            See all trips
        </a>
    </div>

</div>

{% endblock %}
